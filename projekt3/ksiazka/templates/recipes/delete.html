{% extends 'recipes/base.html' %}
{% load static %}

{% block title %}Usuń{% endblock %}

{% block content %}
<h1>Usuń przepis</h1>

<p>Czy na pewno chcesz usunąć: <strong>{{ recipe.name }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Usuń</button>
    <a href="{% url 'recipe_detail' recipe.pk %}" class="btn btn-secondary">Anuluj</a>
</form>
{% endblock %}
